<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C.A.R.E. Intake Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #081f3f, #0d3c66);
  color: white;
}

.container {
  max-width: 800px;
  background: white;
  color: #333;
  margin: 60px auto;
  padding: 40px;
  border-radius: 20px;
}

h1, h2 {
  color: #081f3f;
}

label {
  font-weight: 600;
  margin-top: 20px;
  display: block;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-family: inherit;
}

textarea {
  min-height: 100px;
}

button {
  background: linear-gradient(135deg, #1fb7b6, #e84c88);
  color: white;
  border: none;
  padding: 15px 30px;
  border-radius: 30px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  margin-top: 30px;
  width: 100%;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">
<h1>C.A.R.E. Client Intake Form</h1>
<p>Please complete this form so we can best support your college and career journey.</p>

<form action="https://formspree.io/f/mgojznea" method="POST">

<h2>Student Information</h2>
<label>Student Full Name</label>
<input type="text" name="student_name" required>

<label>Date of Birth</label>
<input type="date" name="dob" required>

<label>Current Grade Level</label>
<select name="grade_level" required>
  <option value="">Select Grade Level</option>
  <option value="9th">9th</option>
  <option value="10th">10th</option>
  <option value="11th">11th</option>
  <option value="12th">12th</option>
  <option value="College Student">College Student</option>
  <option value="Gap Year">Gap Year</option>
</select>

<label>High School / College Name</label>
<input type="text" name="school_name" required>

<h2>Parent / Guardian Information</h2>
<label>Parent/Guardian Name</label>
<input type="text" name="parent_name">

<label>Email</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="tel" name="phone" required>

<h2>Academic Background</h2>
<label>Current GPA (if known)</label>
<input type="text" name="gpa">

<label>Standardized Tests Taken</label>
<textarea name="tests" placeholder="SAT, ACT, PSAT, none yet"></textarea>

<h2>College Planning Status</h2>
<label>Where are you in the college process?</label>
<select name="college_status">
  <option value="">Select Status</option>
  <option value="Just starting">Just starting</option>
  <option value="Exploring colleges">Exploring colleges</option>
  <option value="Working on applications">Working on applications</option>
  <option value="Applications submitted">Applications submitted</option>
</select>

<h2>Career Interests</h2>
<label>Intended Major(s) or Career Interests</label>
<textarea name="career_interests"></textarea>

<h2>Financial Aid & FAFSA</h2>
<label>Will you be applying for financial aid?</label>
<select name="financial_aid">
  <option value="">Select Option</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
  <option value="Not sure">Not sure</option>
</select>

<label>FAFSA Status</label>
<select name="fafsa_status">
  <option value="">Select Status</option>
  <option value="Not started">Not started</option>
  <option value="In progress">In progress</option>
  <option value="Submitted">Submitted</option>
</select>

<h2>Services Needed</h2>
<label>What support are you looking for?</label>
<textarea name="services" placeholder="College list, essays, FAFSA, scholarships, etc."></textarea>

<h2>Package Interest</h2>
<select name="package_interest">
  <option value="">Select Package</option>
  <option value="C.A.R.E. Start">C.A.R.E. Start</option>
  <option value="C.A.R.E. Advance">C.A.R.E. Advance</option>
  <option value="C.A.R.E. Complete">C.A.R.E. Complete</option>
  <option value="Not sure yet">Not sure yet</option>
</select>

<h2>Consent</h2>
<label>
<input type="checkbox" name="consent" required>
 I understand this form does not guarantee services and that consultation is required.
</label>

<button type="submit">Submit Intake Form</button>
</form>

</div>

</body>
</html>
